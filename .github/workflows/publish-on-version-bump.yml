# Push to main → detect version bump in version.go → goreleaser creates tag + release + Formula update
name: Publish on Version Bump

on:
  push:
    branches: [main]

jobs:
  publish:
    # Skip bot commits to avoid infinite loops
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract version from version.go
        id: version
        run: |
          VERSION=$(grep -oP '(?<=var version = ")[0-9]+\.[0-9]+\.[0-9]+' version.go || true)
          if [ -z "$VERSION" ]; then
            echo "version.go contains 'dev' or non-semver value — skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Detected version: v$VERSION"
          fi

      - name: Check if tag already exists
        id: check_tag
        if: steps.version.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist — proceeding with release."
          fi

      - name: Run goreleaser
        if: steps.version.outputs.skip == 'false' && steps.check_tag.outputs.exists == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
