name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Get tag version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
    - name: Calculate SHA256 for GitHub archive
      id: calc_sha
      run: |
        # 等待 GitHub archive CDN 生成（标签刚推送时可能还未就绪）
        URL="https://github.com/${{ github.repository }}/archive/${{ steps.get_version.outputs.tag }}.tar.gz"
        for i in 1 2 3 4 5; do
          curl -sL "$URL" -o archive.tar.gz
          SIZE=$(stat -c%s archive.tar.gz 2>/dev/null || stat -f%z archive.tar.gz)
          if [ "$SIZE" -gt 1024 ]; then
            break
          fi
          echo "⏳ archive 未就绪，等待 10s（第 $i 次）..."
          sleep 10
        done
        SHA256=$(sha256sum archive.tar.gz | cut -d' ' -f1)
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        echo "📦 Archive SHA256: $SHA256"
        
    - name: Update Formula
      run: |
        # 更新 Formula/siti-cli.rb
        sed -i "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/${{ steps.get_version.outputs.tag }}.tar.gz\"|" Formula/siti-cli.rb
        sed -i "s|sha256 \".*\"|sha256 \"${{ steps.calc_sha.outputs.sha256 }}\"|" Formula/siti-cli.rb
        
        echo "✅ Formula 已更新:"
        grep -A1 "url" Formula/siti-cli.rb | head -2
        
    - name: Commit and push Formula update
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Formula/siti-cli.rb
        git commit -m "chore(formula): update to ${{ steps.get_version.outputs.tag }}"
        # 拉取最新再推，避免并发推送冲突
        git pull --rebase origin main
        git push origin HEAD:main
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body: |
          ## 安装 / 更新
          
          ```bash
          # 新用户安装
          brew tap ${{ github.repository_owner }}/siti-cli
          brew install siti-cli
          
          # 已有用户更新
          brew update
          brew upgrade siti-cli
          ```
          
          ## Formula SHA256
          
          ```
          ${{ steps.calc_sha.outputs.sha256 }}
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
