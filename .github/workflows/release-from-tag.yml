# 为已有 tag 创建 GitHub Release：手动 push tag 触发，或 workflow_dispatch 补发
name: Release from Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag 名（如 v1.2.7），手动触发时必填'
        required: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Resolve tag
      id: tag
      run: |
        if [ -n "${{ github.event.inputs.tag }}" ]; then
          TAG="${{ github.event.inputs.tag }}"
        elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
        else
          echo "❌ 手动触发时请填写 tag 参数" >&2
          exit 1
        fi
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        generate_release_notes: true
        body: |
          ## 安装 / 更新

          ```bash
          # 新用户安装
          brew tap ${{ github.repository_owner }}/siti-cli
          brew install siti-cli

          # 已有用户更新
          brew update
          brew upgrade siti-cli
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
